<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f7fb;
      color: #1f2937;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    .hero {
      background-color: #ffffff;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    .hero h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    .hero p {
      line-height: 1.6;
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div id="header"></div>

  <main>
    <section class="hero">
      <h2>Welcome To My First Website</h2>
      <p></p>
    </section>
  </main>

  <div id="footer"></div>

  <script>
    function loadSection(file, targetId) {
      fetch(file)
        .then(function (response) {
          return response.text();
        })
        .then(function (data) {
          document.getElementById(targetId).innerHTML = data;
        })
        .catch(function () {
          document.getElementById(targetId).innerHTML =
            "<p>Could not load " + targetId + ".</p>";
        });
    }

    loadSection("includes/header.html", "header");
    loadSection("includes/footer.html", "footer");
  </script>
</body>
</html>
