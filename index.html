<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/home-index.css">
  <link rel="stylesheet" href="css/aboutUs.css"/>
</head>
<body>
  <div id="header"></div>

  <main>
    <section class="hero">
      <h1>Welcome To My First Website</h1>
      <p>
        This static webpage uses separate header and footer files, with a
        simple homepage layout that is easy to maintain.
      </p>
    </section>
  </main>
 <div id="about"></div>
  <div id="footer"></div>

  <script>
    function loadSection(file, targetId) {
      fetch(file)
        .then(function (response) {
          return response.text();
        })
        .then(function (data) {
          document.getElementById(targetId).innerHTML = data;
        })
        .catch(function () {
          document.getElementById(targetId).innerHTML =
            "<p>Could not load " + targetId + ".</p>";
        });
    }

    loadSection("includes/header.html", "header");
    loadSection("includes/aboutUs.html", "about");
    loadSection("includes/footer.html", "footer");
  </script>
</body>
</html>
