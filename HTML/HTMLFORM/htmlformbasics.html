<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form | Basics</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: rgb(150, 185, 200);
        }

        h1 {
            color: rgb(5, 4, 5);
            margin-top: 0;
        }

        .RegisterForm {
            max-width: 520px;
            margin: 40px auto;
            padding: 24px 28px;
            border: 2px solid rgb(98, 146, 134);
            border-radius: 15px;
            background-color: aliceblue;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: inline-block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .textbox,
        .pass {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            border: 1px solid rgb(98, 146, 134);
            border-radius: 8px;
            background-color: white;
            color: rgb(40, 40, 40);
        }

        .radiobtn,
        .check {
            margin-right: 5px;
        }

        .radio-group label,
        .terms label {
            font-weight: normal;
            margin-right: 12px;
        }

        .tc {
            color: rgb(8, 91, 120);
            text-decoration: none;
        }

        .tc:hover {
            text-decoration: underline;
        }

        .button-group {
            text-align: center;
            margin-top: 20px;
        }

        .reset,
        .submit {
            font-size: 15px;
            border-radius: 8px;
            margin: 3px;
            padding: 8px 12px;
            border: 1px dashed rgb(60, 60, 60);
            cursor: pointer;
        }

        .reset:hover {
            background-color: rgb(223, 128, 128);
        }

        .submit:hover {
            background-color: rgb(126, 225, 126);
        }

        .passwordtc {
            margin-top: 24px;
            text-align: left;
        }

        .passwordtc h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .passwordtc ul {
            margin: 10px 0;
            padding-left: 0;
            color: #444;
            font-size: 15px;
            list-style: none;
        }

        .passwordtc li {
            margin-bottom: 6px;
        }

        .passwordtc span {
            font-weight: bold;
            color: rgb(1, 84, 1);
        }
    </style>
</head>
<body>
    <form class="RegisterForm" action="#" method="post">
        <h1>Registration Form</h1>

        <div class="form-group">
            <label for="name">Enter Your Name:</label>
            <input type="text" class="textbox" id="name" name="name" placeholder="John" required>
        </div>

        <div class="form-group">
            <label for="email">Enter Your Mail:</label>
            <input type="email" class="textbox" id="email" name="email" placeholder="john@mail.com" required>
        </div>

        <div class="form-group">
            <label for="mobile">Enter Your Mobile No.:</label>
            <input
                type="tel"
                class="textbox"
                id="mobile"
                name="mobile"
                pattern="[0-9]{10}"
                title="Enter a 10 digit mobile number"
                required
            >
        </div>

        <div class="form-group radio-group">
            <p><strong>Choose Your Gender:</strong></p>

            <input type="radio" name="gender" id="male" value="male" class="radiobtn" required>
            <label for="male">Male</label>

            <input type="radio" name="gender" id="female" value="female" class="radiobtn">
            <label for="female">Female</label>
        </div>

        <div class="form-group">
            <label for="pass">Enter Your Password:</label>
            <input type="password" class="pass" id="pass" name="password" minlength="8" maxlength="12" required>
        </div>

        <div class="form-group">
            <label for="repass">Re-Enter Your Password:</label>
            <input type="password" class="pass" id="repass" name="confirmPassword" minlength="8" maxlength="12" required>
        </div>

        <div class="form-group terms">
            <input type="checkbox" class="check" id="tc" name="terms" value="accepted" required>
            <label for="tc">
                Accept Our <a href="termsconditions.html" class="tc">Terms &amp; Conditions</a>.
            </label>
        </div>

        <div class="button-group">
            <input type="reset" class="reset" value="Reset">
            <input type="submit" class="submit" value="Submit">
        </div>

        <div class="passwordtc">
            <h2>Password Must:</h2>
            <ul>
                <li>
                    <span>✓</span>
                    Contain 8 to 12 characters.
                </li>
                <li>
                    <span>✓</span>
                    Contain both lowercase and uppercase letters.
                </li>
                <li>
                    <span>✓</span>
                    Contain 1 number.
                </li>
                <li>
                    <span>✓</span>
                    Contain 1 special character like !@#$%^&amp;*()+.
                </li>
                <li>
                    <span>✓</span>
                    Not contain letter or number sequences like abc, 123, 4444, or QWERTY.
                </li>
            </ul>
        </div>
    </form>
</body>
</html>
